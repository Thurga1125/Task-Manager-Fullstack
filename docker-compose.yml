services:

  mongo:
    image: mongo:6
    container_name: taskmanager-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - taskmanager-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskmanager
    depends_on:
      - mongo
    networks:
      - taskmanager-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - taskmanager-net

volumes:
  mongo_data:

networks:
  taskmanager-net:
    driver: bridge
